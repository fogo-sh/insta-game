set sv_hostname "Insta Game Quake III Arena"
set g_motd "Warm up and frag out."
seta rconPassword "changeme"

// Server basics
set dedicated 2
set sv_maxclients 12
set sv_privateClients 0
set sv_pure 1
set sv_allowDownload 1

// Deathmatch (FFA) settings
set g_gametype 0
set timelimit 15
set fraglimit 50
set g_weaponRespawn 5
set g_forcerespawn 5

// Bots — fill to 4 players minimum, kick when humans join
set bot_enable 1
set bot_minplayers 4
set g_spskill 4

// Map rotation — mid-size maps well-suited for 4-12 players FFA
set d1 "map q3dm6;  set nextmap vstr d2"
set d2 "map q3dm7;  set nextmap vstr d3"
set d3 "map q3dm14; set nextmap vstr d4"
set d4 "map q3dm17; set nextmap vstr d5"
set d5 "map q3dm12; set nextmap vstr d1"
set nextmap "vstr d2"

map q3dm6
