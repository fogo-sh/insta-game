set hostname "Insta Game Quake II FFA"

// Short public FFA rounds tuned for roughly 4-12 players.
set deathmatch 1
set coop 0
set maxclients 12
set timelimit 8
set fraglimit 30
set public 1

// Keep movement responsive and make joining with custom assets easy.
set allow_download 1
set allow_download_maps 1
set allow_download_models 1
set allow_download_players 1
set allow_download_sounds 1

// Rotate through the classic DM maps that work well for smaller public games.
set sv_maplist "q2dm1 q2dm2 q2dm3 q2dm5 q2dm6 q2dm7 q2dm8"

map q2dm1
