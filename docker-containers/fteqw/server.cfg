hostname "Insta Game FTEQW FFA 4-12"

// Allow compatible clients to download missing assets from the server.
allow_download 1

deathmatch 1
teamplay 0
coop 0
timelimit 12
fraglimit 40
pausable 0
samelevel 0
noexit 0
sv_aim 1
temp1 0

// FrikBot settings
skill 2
// Bots persist across map changes in deathmatch
saved1 1
// FTE engine: auto-fill with bots to maintain at least 4 players.
// Bots yield their slots to humans as they connect.
bot_minplayers 4

sys_ticrate 0.0138889

alias nextmap_dm1 "map dm1; alias nextmap nextmap_dm2"
alias nextmap_dm2 "map dm2; alias nextmap nextmap_dm3"
alias nextmap_dm3 "map dm3; alias nextmap nextmap_dm4"
alias nextmap_dm4 "map dm4; alias nextmap nextmap_dm5"
alias nextmap_dm5 "map dm5; alias nextmap nextmap_dm6"
alias nextmap_dm6 "map dm6; alias nextmap nextmap_dm1"
alias nextmap "nextmap_dm2"

map dm6
