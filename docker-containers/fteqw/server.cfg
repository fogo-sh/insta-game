hostname "Insta Game FTEQW FFA 4-12"

// Allow compatible clients to download missing assets from the server.
allow_download 1

deathmatch 1
teamplay 0
coop 0
timelimit 12
fraglimit 40
pausable 0
samelevel 0
noexit 0
sv_aim 1
temp1 0

// Omicron bot skill 0-3 (2.5 = challenging but beatable)
skill 2.5

// FTE engine: fill empty slots with bots until at least 4 players are present.
// Bots yield their slots to humans as they join.
bot_minplayers 4

sys_ticrate 0.0138889

// Map rotation — each alias adds 4 bots after the level loads.
// "addbot" is an Omicron admin console command; the dedicated server console
// has admin privilege so these run automatically.
alias addbots "addbot; addbot; addbot; addbot"

alias nextmap_dm1 "map dm1; alias nextmap nextmap_dm2; addbots"
alias nextmap_dm2 "map dm2; alias nextmap nextmap_dm3; addbots"
alias nextmap_dm3 "map dm3; alias nextmap nextmap_dm4; addbots"
alias nextmap_dm4 "map dm4; alias nextmap nextmap_dm5; addbots"
alias nextmap_dm5 "map dm5; alias nextmap nextmap_dm6; addbots"
alias nextmap_dm6 "map dm6; alias nextmap nextmap_dm1; addbots"
alias nextmap "nextmap_dm2"

map dm6
addbots
