hostname "Insta Game FTEQW FFA 4-12"
rcon_password "changeme"

// Allow compatible clients to download missing assets from the server.
allow_download 1

deathmatch 1
teamplay 0
coop 0
timelimit 12
fraglimit 40
pausable 0
samelevel 0
noexit 0
sv_aim 1
temp1 0

// FrikBot settings.
// skill 0-3; bots use this when added via impulse 100.
skill 1

// FrikBot bot persistence: these cvars are read by WaypointWatch on every
// map load. saved1=1 sets OPT_SAVEBOTS; scratch1 is the bitmask of bots
// to restore (bits 0-3 = bots 1-4, sum = 15); scratch2 packs each bot's
// skill in 2 bits (all four at skill 1 → 1|4|16|64 = 85).
// FrikBot resets scratch1 to the live bot set at end of each map, so the
// count naturally follows humans joining/leaving across map changes.
saved1 1
scratch1 15
scratch2 85

alias nextmap_dm1 "map dm1; alias nextmap nextmap_dm2"
alias nextmap_dm2 "map dm2; alias nextmap nextmap_dm3"
alias nextmap_dm3 "map dm3; alias nextmap nextmap_dm4"
alias nextmap_dm4 "map dm4; alias nextmap nextmap_dm5"
alias nextmap_dm5 "map dm5; alias nextmap nextmap_dm6"
alias nextmap_dm6 "map dm6; alias nextmap nextmap_dm1"
alias nextmap "nextmap_dm2"

map dm6
