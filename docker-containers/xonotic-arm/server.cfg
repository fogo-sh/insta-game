sv_public 1
hostname "Insta Game Xonotic InstaGib 4-12"
sv_motd "InstaGib public server for 4-12 players. Fast maps, quick votes, low-pop bots."
sv_status_privacy 1

maxplayers 12
g_maxplayers 12
g_start_delay 8

gametype dm
g_instagib 1
g_powerups 0
g_balance_teams 1
g_balance_teams_prevent_imbalance 1

timelimit_override 10
fraglimit_override 35
capturelimit_override 5
g_domination_point_limit 150

g_maplist "afterslime boil catharsis courtfun drain erbium finalrage fuse glowplant implosion runningman silentsiege solarium stormkeep xoylent"
g_maplist_shuffle 1
g_maplist_mostrecent_count 4
g_maplist_votable 8
g_maplist_votable_suggestions 2
g_maplist_votable_abstain 1
g_maplist_votable_nodetail 1
g_maplist_check_waypoints 1

sv_vote_call 1
sv_vote_master 1
sv_vote_majority_factor 0.5
sv_vote_majority_factor_of_voted 0
sv_vote_gametype 1
sv_vote_gametype_options "dm tdm ctf ft"
sv_vote_commands "restart fraglimit gotomap nextmap endmatch reducematchtime extendmatchtime allready kick cointoss movetoauto shuffleteams bots nobots g_grappling_hook"

skill 7
minplayers 4
minplayers_per_team 2
alias bots "minplayers 4; minplayers_per_team 2"

sv_maxidle 300
sv_taunt 1
sv_autotaunt 1

sv_weaponstats_file "http://www.xonotic.org/weaponbalance/"
