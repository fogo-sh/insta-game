services:
  xonotic:
    image: ghcr.io/fogo-sh/insta-game:xonotic
    build:
      context: ./docker-containers/xonotic/
      platforms:
        - linux/arm64
    ports:
      - "127.0.0.1:26000:26000/udp"
      - "127.0.0.1:5001:5001/tcp"
    environment:
      PROTOCOL: "xonotic"
      GAME_CMD: "./xonotic-linux-arm64-dedicated"
      GAME_ARGS: ""
      GAME_QUIT_CMD: "exit"
      GAME_QUIT_TIMEOUT: "30"
      TOKEN: "abc123"
      # DATA_URL is optional for Xonotic — a default server.cfg is bundled.
      # Set it to supply a custom server.cfg, e.g.:
      # DATA_URL: "https://example.com/server.cfg=/opt/data/server.cfg"

  qssm:
    image: ghcr.io/fogo-sh/insta-game:qssm
    build:
      context: ./docker-containers/qssm/
      platforms:
        - linux/arm64
    ports:
      - "127.0.0.1:26000:26000/udp"
      - "127.0.0.1:5001:5001/tcp"
    environment:
      PROTOCOL: "quake1"
      GAME_CMD: "./qssm"
      GAME_ARGS: "-dedicated 12 -basedir /opt -game id1 -port 26000 +exec server.cfg"
      GAME_QUIT_CMD: "quit"
      GAME_QUIT_TIMEOUT: "15"
      TOKEN: "abc123"
      # DATA_URL is required for QSS-M — Quake pak files are commercial and not bundled.
      # Format: semicolon-separated url=path entries. Zips are extracted, raw files are written directly.
      # Example: DATA_URL: "https://example.com/quake-assets.zip=/opt/"
