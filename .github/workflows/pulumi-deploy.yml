name: Pulumi Deploy

on:
  push:
    branches:
      - main
    paths:
      - "docker-containers/**"
      - "sidecar/**"
      - "pulumi/**"
      - "launcher/**"
      - ".github/workflows/pulumi-preview.yml"
      - ".github/workflows/pulumi-deploy.yml"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

concurrency:
  group: pulumi-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-24.04
    defaults:
      run:
        shell: bash
        working-directory: pulumi
    env:
      AWS_REGION: ca-central-1
      PULUMI_STACK: ${{ vars.PULUMI_STACK }}
      PULUMI_BACKEND_URL: ${{ vars.PULUMI_BACKEND_URL }}
      PULUMI_CONFIG_PASSPHRASE: ${{ secrets.PULUMI_CONFIG_PASSPHRASE }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: launcher/package-lock.json

      - name: Install launcher dependencies
        run: npm ci
        working-directory: launcher

      - name: Build launcher bundle
        run: npm run build
        working-directory: launcher

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Pulumi dependencies
        run: uv sync

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to Pulumi backend
        run: pulumi login "$PULUMI_BACKEND_URL"

      - name: Select Pulumi stack
        run: pulumi stack select "$PULUMI_STACK"

      - name: Deploy infrastructure
        uses: pulumi/actions@v6
        with:
          command: up
          stack-name: ${{ env.PULUMI_STACK }}
          work-dir: pulumi
          diff: true
          refresh: true
          upsert: false
