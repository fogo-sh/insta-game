name: Pulumi Unlock

on:
  workflow_dispatch:
    inputs:
      stack:
        description: Pulumi stack to unlock
        required: true
        default: prod

permissions:
  id-token: write
  contents: read

concurrency:
  group: pulumi-${{ inputs.stack }}
  cancel-in-progress: false

jobs:
  unlock:
    runs-on: ubuntu-24.04
    defaults:
      run:
        shell: bash
        working-directory: pulumi
    env:
      AWS_REGION: ca-central-1
      PULUMI_BACKEND_URL: ${{ vars.PULUMI_BACKEND_URL }}
      PULUMI_CONFIG_PASSPHRASE: ${{ secrets.PULUMI_CONFIG_PASSPHRASE }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Pulumi dependencies
        run: uv sync

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to Pulumi backend
        run: pulumi login "$PULUMI_BACKEND_URL"

      - name: Cancel active or stale update
        run: pulumi cancel --yes --stack "${{ inputs.stack }}"
