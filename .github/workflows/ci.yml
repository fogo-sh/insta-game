name: CI

on:
  pull_request:
    paths:
      - "launcher/**"
      - "sidecar/**"
      - "pulumi/**"
      - ".github/workflows/ci.yml"
  push:
    branches: ["main"]
    paths:
      - "launcher/**"
      - "sidecar/**"
      - "pulumi/**"
      - ".github/workflows/ci.yml"
  workflow_dispatch:

jobs:
  detect-changes:
    runs-on: ubuntu-24.04
    outputs:
      launcher: ${{ steps.filter.outputs.launcher }}
      sidecar: ${{ steps.filter.outputs.sidecar }}
      pulumi: ${{ steps.filter.outputs.pulumi }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            launcher:
              - 'launcher/**'
            sidecar:
              - 'sidecar/**'
            pulumi:
              - 'pulumi/**'

  launcher:
    needs: detect-changes
    if: ${{ github.event_name == 'workflow_dispatch' || needs.detect-changes.outputs.launcher == 'true' }}
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: launcher
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: launcher/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build launcher
        run: npm run build

  sidecar:
    needs: detect-changes
    if: ${{ github.event_name == 'workflow_dispatch' || needs.detect-changes.outputs.sidecar == 'true' }}
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: sidecar
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: sidecar/go.mod
          cache-dependency-path: sidecar/go.sum

      - name: Run tests
        run: make test

  pulumi:
    needs: detect-changes
    if: ${{ github.event_name == 'workflow_dispatch' || needs.detect-changes.outputs.pulumi == 'true' }}
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: pulumi
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --group dev

      - name: Ruff check
        run: uv run ruff check .
